kicker: Mi Rincón Seguro
titulo: Espacios seguros de regulación emocional y estimulación sensorial para personas TEA.
lead: >-
  Mi Rincón Seguro es un proyecto en desarrollo que busca habilitar dos salas especialmente
  diseñadas para acompañar a personas del espectro autista en sus procesos de autorregulación,
  bienestar emocional y desarrollo sensorial, sin límite de edad.
parrafos:
  - >-
    Este proyecto nace a partir de las necesidades reales detectadas en familias que acuden a
    Renacer, quienes requieren espacios adecuados para acompañar procesos de regulación y
    estimulación sensorial en distintas etapas de la vida.
  - >-
    El proyecto contempla dos salas complementarias: una Sala de Regulación Emocional,
    orientada a la contención, calma y manejo de crisis; y una Sala de Estimulación Sensorial,
    enfocada en la exploración, activación y desarrollo sensorial.
  - >-
    Ambos espacios estarán diseñados con materiales, colores, texturas y niveles de
    estimulación pensados específicamente para facilitar la autorregulación y el bienestar
    de las personas neurodivergentes que los utilicen.
  - >-
    Actualmente, Renacer se encuentra en etapa de planificación con el objetivo de habilitar
    estos espacios seguros, adaptados y respetuosos de las diversas necesidades sensoriales
    de la comunidad.
